name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & Release Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows (Release)
        run: flutter build windows --release

      - name: Package release zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $outDir = "build\windows\x64\runner\Release"
          $zipName = "MCP_Console_${version}_windows.zip"
          Compress-Archive -Path "$outDir\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MCP Console ${{ github.ref_name }}"
          body: |
            ## MCP Console ${{ github.ref_name }}

            ### 下載安裝
            1. 下載下方的 `MCP_Console_*_windows.zip`
            2. 解壓縮到任意資料夾
            3. 執行 `mcp_console.exe`

            ### 系統需求
            - Windows 10 / 11 (x64)
            - 無需安裝其他執行環境

            ### 變更內容
            請見 [Commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
